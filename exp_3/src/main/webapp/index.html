<!DOCTYPE html>
<html>
<head>
    <title>Employee Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
        }
        .container {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0px 0px 10px gray;
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Employee Registration</h2>

    <form action="addEmployee" method="post">
        
        <!-- Name -->
        <label>Name:</label>
        <input type="text" name="name" required>

        <!-- Email -->
        <label>Email:</label>
        <input type="email" name="email" required>

        <!-- Salary -->
        <label>Salary:</label>
        <input type="number" name="salary" step="0.01" required>

        <button type="submit">Save Employee</button>
    </form>
</div>

</body>
</html>
